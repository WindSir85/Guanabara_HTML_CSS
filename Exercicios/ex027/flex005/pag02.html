<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Centralizado</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: lightsalmon;
        }

        main{
            background-color: lightgreen;
            width: 80vw;
            height: 80vh;
            display: flex;
            flex-flow: row wrap;
            justify-content: center;
            align-items: center;
        }

        section{
            background-color: lightblue;
            height: 300px;
            width: 300px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>Tela de login</h1>
        </section>
        <section>
            <h1>Tela de registro</h1>
        </section>
    </main>
</body>
</html>
