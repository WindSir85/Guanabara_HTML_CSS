<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container {
            height: 600px;
            background-color: lightsalmon;
            display: flex;
            flex-flow: row wrap;
            justify-content: space-between;
            align-items: flex-start;
        }
        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Item de exemplo - 1</div>
        <div class="item">Item de exemplo - 2</div>
        <div class="item">Item de exemplo - 3</div>
        <div class="item">Item de exemplo - 4</div>
        <div class="item">Item de exemplo - 5</div>
        <div class="item">Item de exemplo - 6</div>        
        <div class="item">Item de exemplo - 7</div>
    </div>
</body>
</html>
