<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
            background-color: lightgray;
        }

        thead, tfoot{
            background-color: grey;
            color: white
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        td.num {
            text-align: right;
        }

    </style>
</head>
<body>
    <h1>Uso de tabelas grandes</h1>
    <!--
       ANATOMIA PARA TABELAS GRANDES
        TABLE
            CAPTION
            THEAD
            TBODY
            TFOOT
    -->
    <table>
        <caption>
            População dos estados brasileiros
        </caption>
        <thead>
            <th scope="col">Estado</th>
            <th scope="col">População</th>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="num">45.919.049</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21.168.791</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17.366.189</td>
            </tr>
            <tr>
                <td>Bahia</td>
                <td class="num">10.896.961</td>
            </tr>
            <tr>
                <td>Paraná</td>
                <td class="num">9.069.677</td>
            </tr>
            <tr>
                <td>Rio Grande do Sul</td>
                <td class="num">11.299.659</td>
            </tr>
            <tr>
                <td>Santa Catarina</td>
                <td class="num">7.338.473</td>
            </tr>
            <tr>
                <td>Mato Grosso</td>
                <td class="num">3.567.234</td>
            </tr>
            <tr>
                <td>Goiás</td>
                <td class="num">7.079.051</td>  
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total</th> 
                <td class="num"><strong>132.417.353</strong></td>
        </tfoot>
    </table>
</body>
</html>
