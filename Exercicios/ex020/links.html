<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /*
            SELETORES PERSONALIZADOS
            #  = id
            .  = class
            :  = pseudo-class
            :: = pseudo-element
            >  = child
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            border: 1px solid black;
            width: 400px;
            text-align: center;
            padding: 20px;
        }
        a{
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
        a:hover{
            color: red;
            text-decoration: underline;
        }
        a::after{
            content: " [Link Externo]";
            font-size: 0.8em;
            color: lightgray;
        }
    </style>
</head>
<body>
    <h1>Personalisando Links</h1>
    <ul>
        <li><a href="https://www.google.com" target="_blank">Repositório do GitHUb</a></li>
        <li><a href="https://www.facebook.com" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.instagram.com" target="_blank">Site do CursoEmVideo</a></li>
    </ul>
</body>
</html>
