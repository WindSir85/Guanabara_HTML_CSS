<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linhas </h1>
    <hr>
    <p>Você pode excrever um parágrafos de qualquer jeito. Basta colocar tudo entre as tags &lt;p&gt; e &lt;/p&gt;</p> <!-- lt means "less than", gt means "greater than"-->
    <p>Se precisar quebrar o texto em algum lugar específico <br> você pode usar a tag &lt;br&gt;
    </p>
    <p>Vamos adicionar alguns símbolos especiais:
        <br>&reg;
        <br>&copy;
        <br>&trade;
        <br>&pound;
        <br>&euro;
    </p>
    <p>Vamos adicionar alguns emojis:
        &#x1F596;
        &#x1F913;
    </p>
</body>
</html>
