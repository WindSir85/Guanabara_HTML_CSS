<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        caption {
            font-size: 1.5em;
            font-weight: bold;
            padding: 10px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: gray;
            color: white;
            text-align: center;
        }

        th.area {
            background-color: white;
            color: black;
        }

        td.media {
            background-color: gray;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        td.num {
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <caption>Notas do Semestre</caption>
        <thead>
            <tr>
                <th scope="col" rowspan="2">Área</th>
                <th scope="col" rowspan="2">Disciplinas</th>
                <th scope="colgroup" colspan="2">Notas</th>
                <th scope="col" rowspan="2">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="rowgroup" rowspan="4" class="area">Exatas</th>
                <td>Matemática</td>
                <td class="num">8.5</td>
                <td class="num">9.0</td>
                <td class="num">8.75</td>
            </tr>
            <tr>
                <td>Física</td>
                <td class="num">7.0</td>
                <td class="num">8.0</td>
                <td class="num">7.5</td>
            </tr>
            <tr>
                <td>Química</td>
                <td class="num">9.0</td>
                <td class="num">9.5</td>
                <td class="num">9.25</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="num">8.0</td>
                <td class="num">8.5</td>
                <td class="num">8.25</td>
            </tr>
            <tr>
                <th scope="row" colspan="4">Média de Exatas</th>
                <td class="media">8.44</td>
            </tr>
            <tr>
                <th scope="rowgroup" rowspan="2" class="area">Humanas</th>
                <td>História</td>
                <td class="num">7.5</td>
                <td class="num">8.0</td>
                <td class="num">7.75</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td class="num">8.0</td>
                <td class="num">8.5</td>
                <td class="num">8.25</td>
            </tr>
            <tr>
                <th scope="row" colspan="4">Média de Humanas</th>
                <td class="media">7.81</td>
            </tr>
        </tbody>
    </table>
        
</body>
</html>
