<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>
    <video width="560" controls poster="media/thumb.png" autoplay>
        <source src="media/12897482_1920_1080_30fps.mp4" type="video/mp4">
    </video>
    <p>Seu navegador não suporta o elemento de vídeo.</p>
    <h1>Inserindo vídeos de hospedagem externa</h1>
    <p>Este vídeo está hospedado no YouTube.</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/v_Tgq5OUrmE?si=vkvEFYwoSc7e7Dyz" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <p>Este vídeo está hospedado no Vimeo.</p>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/1044564104?h=99e6ffaa98" width="560" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>
</body>
</html>
