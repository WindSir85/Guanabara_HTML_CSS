<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
    iframe {
        width: 600px; /* Largura do iframe */
        height: 400px; /* Altura do iframe */
        margin: 10px 0; /* Margem para separar os iframes do texto */
    }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>Acessando o site do
    <!-- Tamanho padrão de iframes: 300px de largura e 200px de altura -->     
        <iframe src="https://www.cursoemvideo.com" frameborder="0" scrolling="no"></iframe>
        <a href="https://www.cursoemvideo.com" target="_blank">Curso em Vídeo</a>
    para aprender a programar.</p>
    <p>O repositório do professor Gustavo Guanabara no
        <iframe src="https://gustavoguanabara.github.io" frameborder="0"></iframe>
        <a href="https://gustavoguanabara.github.io" target="_blank">GitHub</a>
    também é muito legal.
    </p>
</body>
</html>
